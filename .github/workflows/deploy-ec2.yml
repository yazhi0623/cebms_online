name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      DEPLOY_COMPOSE_FILE: docker-compose.prod.image-based.yml
      DEPLOY_HEALTH_URL: http://127.0.0.1/health
      DEPLOY_HEALTH_HOST: 52.77.76.22
      DEPLOY_CLEANUP_SCRIPT: post-deploy-cleanup.sh
      DEPLOY_CLEANUP_LOG: post-deploy-cleanup.log
      DEPLOY_IMAGE_PRUNE_UNTIL: 168h
      DEPLOY_BUILDER_PRUNE_UNTIL: 168h
      DEPLOY_JOURNAL_VACUUM_TIME: 7d

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"
          echo "owner_lower=${owner_lower}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend unit tests
        working-directory: backend
        run: python -m pytest tests/unit -q

      - name: Run backend integration tests
        working-directory: backend
        run: python -m pytest tests/integration -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate post-deploy cleanup script
        shell: bash
        run: sh -n deploy/aws-ubuntu-docker-private-api/post-deploy-cleanup.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/aws-ubuntu-docker-private-api/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/cebms-backend:prod
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/cebms-backend:sha-${{ steps.meta.outputs.short_sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/aws-ubuntu-docker-private-api/frontend.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_HEALTH_URL=/health
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/cebms-frontend:prod
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/cebms-frontend:sha-${{ steps.meta.outputs.short_sha }}

      - name: Upload post-deploy cleanup script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy/aws-ubuntu-docker-private-api/post-deploy-cleanup.sh
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          strip_components: 2
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            test -f "./${{ env.DEPLOY_CLEANUP_SCRIPT }}"
            chmod +x "./${{ env.DEPLOY_CLEANUP_SCRIPT }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose --env-file .env.prod -f docker-compose.prod.yml down --remove-orphans || true
            docker compose --env-file .env.prod -f "${{ env.DEPLOY_COMPOSE_FILE }}" down --remove-orphans || true
            docker compose --env-file .env.prod -f "${{ env.DEPLOY_COMPOSE_FILE }}" pull
            docker compose --env-file .env.prod -f "${{ env.DEPLOY_COMPOSE_FILE }}" up -d
            health_check_passed=0
            health_check_attempt=0
            for i in $(seq 1 20); do
              if curl --fail --silent -H "Host: ${{ env.DEPLOY_HEALTH_HOST }}" "${{ env.DEPLOY_HEALTH_URL }}" > /dev/null; then
                health_check_passed=1
                health_check_attempt="${i}"
                break
              fi
              echo "Health check not ready on attempt ${i}, waiting..."
              sleep 3
            done
            if [ "${health_check_passed}" -ne 1 ]; then
              echo "Health check failed after retries"
              exit 1
            fi
            rm -f "./${{ env.DEPLOY_CLEANUP_LOG }}"
            echo "Health check passed on attempt ${health_check_attempt}" | tee "./${{ env.DEPLOY_CLEANUP_LOG }}"
            echo "Starting cleanup script..." | tee -a "./${{ env.DEPLOY_CLEANUP_LOG }}"
            echo "Disk usage before cleanup:" | tee -a "./${{ env.DEPLOY_CLEANUP_LOG }}"
            df -h | tee -a "./${{ env.DEPLOY_CLEANUP_LOG }}"
            docker system df | tee -a "./${{ env.DEPLOY_CLEANUP_LOG }}"
            DEPLOY_IMAGE_PRUNE_UNTIL="${{ env.DEPLOY_IMAGE_PRUNE_UNTIL }}" \
            DEPLOY_BUILDER_PRUNE_UNTIL="${{ env.DEPLOY_BUILDER_PRUNE_UNTIL }}" \
            DEPLOY_JOURNAL_VACUUM_TIME="${{ env.DEPLOY_JOURNAL_VACUUM_TIME }}" \
            sh "./${{ env.DEPLOY_CLEANUP_SCRIPT }}" 2>&1 | tee -a "./${{ env.DEPLOY_CLEANUP_LOG }}"
            echo "Cleanup script finished." | tee -a "./${{ env.DEPLOY_CLEANUP_LOG }}"
            echo "Cleanup log output:"
            cat "./${{ env.DEPLOY_CLEANUP_LOG }}"

      - name: Print cleanup log from EC2
        if: ${{ success() }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            if [ -f "./${{ env.DEPLOY_CLEANUP_LOG }}" ]; then
              echo "Remote cleanup log:"
              cat "./${{ env.DEPLOY_CLEANUP_LOG }}"
            else
              echo "Cleanup log not found: ./${{ env.DEPLOY_CLEANUP_LOG }}"
              exit 1
            fi
