name: cebms-prod-private-api

services:
  postgres:
    image: postgres:16
    container_name: cebms-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ghcr.io/yazhi0623/cebms-backend:prod
    container_name: cebms-backend-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    volumes:
      - backend_generated:/app/backend/generated

  frontend:
    image: ghcr.io/yazhi0623/cebms-frontend:prod
    container_name: cebms-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: aws-ubuntu-docker-private-api_postgres_data
  backend_generated:
    name: aws-ubuntu-docker-private-api_backend_generated
